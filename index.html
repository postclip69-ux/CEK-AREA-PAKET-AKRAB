<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Area XL</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Nunito', sans-serif;
        }

        /* PERBAIKAN HEADER: Dibuat benar-benar sticky dan background lebih solid */
        .header-glass {
            position: sticky;
            top: 0;
            background: rgba(20, 18, 50, 0.85); /* Warna lebih padat biar gak tembus pandang banget */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            padding: 20px 0;
            z-index: 9999; /* Z-index ditinggikan agar selalu di posisi terdepan */
        }

        .header-title {
            background: linear-gradient(to right, #00c6ff, #0072ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Glossy Search Input */
        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px; /* Tambahan padding untuk layar HP */
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00c6ff;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
            color: #fff;
            outline: none;
        }

        /* Glossy Table Container */
        .table-wrapper {
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
        }

        /* PERBAIKAN TABEL: Menghapus background putih bawaan bootstrap */
        .table {
            color: #e0e0e0;
            margin-bottom: 0;
            --bs-table-bg: transparent; /* Paksa transparan */
        }

        .table > thead {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }

        .table > thead > tr > th {
            color: #fff;
            font-weight: 600;
            border: none;
            padding: 15px;
            letter-spacing: 0.5px;
        }

        .table > tbody > tr > td {
            border-color: rgba(255, 255, 255, 0.05);
            padding: 15px;
            vertical-align: middle;
            background-color: transparent !important; /* Paksa baris menjadi transparan */
            color: #ffffff; /* Paksa font warna putih */
        }

        .table > tbody > tr {
            transition: all 0.2s ease;
        }

        .table > tbody > tr:hover > td {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(106, 17, 203, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 117, 252, 0.8);
        }

        /* Loader */
        #loader {
            text-align: center;
            padding: 20px;
            color: #00c6ff;
        }
    </style>
</head>

<body>

    <div class="header-glass">
        <div class="container text-center">
            <h4 class="header-title mb-2">Cek Area Akrab XL</h4>
            <p class="text-light opacity-75 small mb-3">Ketik nama kota atau kabupaten Anda di bawah ini</p>
            <div class="search-container">
                <input type="text" id="searchInput" class="form-control" placeholder="🔍 Cari kota atau kabupaten..." onkeyup="searchTable()">
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="table-wrapper table-responsive">
            <table class="table table-borderless" id="dataTable">
                <thead>
                    <tr>
                        <th width="20%">Provinsi</th>
                        <th width="60%">Kota/Kabupaten</th>
                        <th width="20%">Area</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="loader">Memuat data area...</div>
        </div>
    </div>

    <script>
        let areaData = [];

        document.addEventListener("DOMContentLoaded", () => {
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    areaData = data;
                    document.getElementById('loader').style.display = 'none';
                    renderTable(areaData);
                })
                .catch(error => {
                    console.error('Gagal mengambil data:', error);
                    document.getElementById('loader').innerText = 'Gagal memuat data. Pastikan file JSON tersedia.';
                });
        });

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            data.forEach(item => {
                let badgeClass = 'bg-secondary';
                if(item.area === 'Area 1') badgeClass = 'bg-info text-dark';
                else if(item.area === 'Area 2') badgeClass = 'bg-primary';
                else if(item.area === 'Area 3') badgeClass = 'bg-success';
                else if(item.area === 'Area 4') badgeClass = 'bg-warning text-dark';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.provinsi}</td>
                    <td>${item.kota}</td>
                    <td><span class="badge ${badgeClass} bg-opacity-75">${item.area}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function searchTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = areaData.filter(item => 
                item.provinsi.toLowerCase().includes(input) ||
                item.kota.toLowerCase().includes(input) ||
                item.area.toLowerCase().includes(input)
            );
            renderTable(filteredData);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
